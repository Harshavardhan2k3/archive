name: YT Stream to MEGA Archiver

on:
  workflow_dispatch: # Pure manual trigger, no inputs needed

env:
  # REPLACE THIS with the actual channel's live URL
  # Example: "https://www.youtube.com/@ChannelName/live"
  TARGET_URL: "https://www.youtube.com/@Harsha_Asta/live"

jobs:
  archive-stream:
    runs-on: ubuntu-22.04
    steps:
      - name: Install Dependencies (yt-dlp, Deno & MEGAcmd)
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip unzip curl
          
          # Install yt-dlp via pip for the latest version
          pip3 install -U yt-dlp
          
          # Install Deno (Required by yt-dlp for YouTube JS challenges)
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH
          
          # Install MEGAcmd for CLI uploads
          wget https://mega.nz/linux/repo/xUbuntu_22.04/amd64/megacmd-xUbuntu_22.04_amd64.deb
          sudo apt install -y "$PWD/megacmd-xUbuntu_22.04_amd64.deb"

      - name: Set up YouTube Cookies
        run: |
          # Write the GitHub Secret to a local file for yt-dlp
          echo "${{ secrets.YT_COOKIES }}" > cookies.txt

      - name: Download Stream (with Auto-Timeout)
        # timeout -s SIGINT 345m safely stops the process at 5h 45m.
        # || true ensures the workflow moves to the next step even if the timeout occurs.
        run: |
          timeout --signal=SIGINT 340m yt-dlp \
            --cookies cookies.txt \
            --wait-for-video 60 \
            --write-thumbnail \
            --embed-thumbnail \
            --embed-metadata \
            --force-ipv4 \
            --extractor-args "youtube:player_client=ios,tv,web" \
            -o "9_%(upload_date)s_%(title)s_%(id)s.%(ext)s" \
            "$TARGET_URL" || true

      - name: Upload to MEGA
        env:
          MEGA_EMAIL: ${{ secrets.MEGA_EMAIL }}
          MEGA_PASSWORD: ${{ secrets.MEGA_PASSWORD }}
        run: |
          # Authenticate, upload the downloaded archive to the root directory, and logout
          mega-login "$MEGA_EMAIL" "$MEGA_PASSWORD"
          mega-put stream_archive_* /
          mega-logout
